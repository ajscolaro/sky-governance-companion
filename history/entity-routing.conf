# Entity routing: maps Atlas documents to history directories.
# Format: prefix<TAB>directory-path<TAB>anchor-uuid   (UUID column optional)
#   - prefix      number-prefix used for the legacy fallback match
#   - directory   history dir (relative to history/)
#   - anchor-uuid IMMUTABLE UUID of the subtree's root doc; the primary key
#
# Routing (enrich.py): a changed doc routes to the first rule whose anchor-uuid
# is the doc's own UUID or one of its ancestors' UUIDs (resolved from the doc's
# CURRENT number via the index). This survives renumbering — when a subtree is
# renumbered, the UUID is unchanged so the anchor still matches, even though the
# prefix below has gone stale. The prefix is only a human hint + fallback for
# un-anchored rules and deleted docs. Order matters: most specific first.
#
# To anchor a new entity: add its root doc's UUID (search-index.sh --uuid / the
# index's number_to_uuid). build-time validator (enrich.py) warns if an anchor
# UUID is missing from the index — that means re-anchoring is needed.
#
