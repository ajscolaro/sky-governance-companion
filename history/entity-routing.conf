# Entity routing: maps Atlas path prefixes to history directories.
# Format: prefix<TAB>directory-path (relative to history/)
# Order matters: most specific prefixes first.
#
# When a new agent or major entity appears in the Atlas, add a line here
# and create the corresponding changelog.md file.
# When a scope's changelog grows too large (50+ entries), split it by
# adding article-level subdirectories following the same pattern as A.6.
#
# Agents (most specific — matched before the A.6 catch-all)
A.6.1.1.1	A.6--agents/A.6.1.1.1--spark
A.6.1.1.2	A.6--agents/A.6.1.1.2--grove
A.6.1.1.3	A.6--agents/A.6.1.1.3--keel
A.6.1.1.4	A.6--agents/A.6.1.1.4--skybase
A.6.1.1.5	A.6--agents/A.6.1.1.5--obex
A.6.1.1.6	A.6--agents/A.6.1.1.6--pattern
A.6.1.1.7	A.6--agents/A.6.1.1.7--launch-agent-6
A.6.1.1.8	A.6--agents/A.6.1.1.8--launch-agent-7
#
# Article-level splits within scopes (most specific first within scope)
A.1.5.1.5	A.1--governance/A.1.5.1.5--ad-roster
A.1.5.6.1.3	A.1--governance/A.1.5.6.1.3--ad-breaches
A.2.7.1.1.1.1	A.2--support/A.2.7.1.1.1.1--forum-accounts
#
# Scopes (least specific — catch-all for each scope)
A.0	A.0--preamble
A.1	A.1--governance
A.2	A.2--support
A.3	A.3--stability
A.4	A.4--protocol
A.5	A.5--accessibility
A.6	A.6--agents
